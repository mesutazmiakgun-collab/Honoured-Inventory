<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Honoured Bro | Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">
    <style>
        body { 
            font-family: 'Finger Paint', cursive; 
            background: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
        }

        /* Sidebar - From your Screenshot */
        .sidebar { 
            width: 190px; 
            background: #050505; 
            padding: 30px 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 1px solid #111;
        }

        .sidebar-title { 
            font-size: 1.3rem; 
            margin-bottom: 40px; 
            line-height: 1.2;
            color: #FF0000; 
        }

        .nav-btn { 
            background: transparent; 
            border: 1px solid #333; 
            color: #fff; 
            padding: 12px; 
            text-align: left; 
            cursor: pointer; 
            margin-bottom: 12px;
            font-family: 'Finger Paint', cursive;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        /* JJS Blue Glow Selection */
        .nav-btn.active { 
            border: 2px solid #5ab9ff; 
            box-shadow: inset 0 0 10px rgba(90, 185, 255, 0.4);
        }

        /* Main Content */
        .main-content { 
            flex-grow: 1; 
            padding: 50px; 
            background: #000;
            overflow-y: auto; 
        }

        h1 { font-size: 3.5rem; margin-top: 0; color: #fff; letter-spacing: -2px; }
        p { font-size: 1.2rem; line-height: 1.6; max-width: 800px; color: #ccc; }

        /* Video Box - Original Red Border */
        .video-box { 
            max-width: 800px; 
            aspect-ratio: 16/9; 
            border: 3px solid #FF0000;
            margin-top: 30px;
            background: #000;
        }
        iframe { width: 100%; height: 100%; border: none; }

        /* Guns.lol Link Button */
        .guns-link {
            display: inline-block;
            margin-top: 20px;
            padding: 15px 30px;
            background: #111;
            border: 2px solid #FF0000;
            color: #fff;
            text-decoration: none;
            font-size: 1.5rem;
            transition: 0.3s;
        }
        .guns-link:hover {
            background: #FF0000;
            box-shadow: 0 0 15px #FF0000;
        }

        /* Code Vault Section */
        .code-row {
            background: #0a0a0a;
            padding: 20px;
            border: 1px solid #222;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 15px;
            border-left: 6px solid #FF0000;
        }

        .copy-btn {
            background: #FF0000;
            color: #fff;
            border: none;
            padding: 10px 20px;
            cursor: pointer;
            font-family: 'Finger Paint', cursive;
        }

        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <div class="sidebar">
        <div class="sidebar-title">Not Hidden<br>Inventory</div>
        <button class="nav-btn active" onclick="showPage('home', this)">Home</button>
        <button class="nav-btn" onclick="showPage('codes', this)">Codes</button>
        <button class="nav-btn" onclick="showPage('movesets', this)">Movesets</button>
        <button class="nav-btn" onclick="showPage('animations', this)">Animations</button>
        <button class="nav-btn" onclick="showPage('contact', this)">Contact</button>
    </div>

    <div class="main-content">
        <div id="home" class="page active">
            <h1>Home</h1>
            <p>Thanks for using the site. Check out the other tabs.</p>
            <p>To use these moves for content, please credit me. For personal use or learning, no credit is needed.</p>
            
            <div class="video-box">
                <iframe src="https://www.youtube.com/embed/DUqZNqbLF5g" allowfullscreen></iframe>
            </div>
        </div>

        <div id="codes" class="page">
            <h1>Codes</h1>
            <p>Active viewer codes:</p>
            <div class="code-row">
                <span id="c1">JJS_GIFT_2026</span>
                <button class="copy-btn" onclick="copy('c1')">COPY</button>
            </div>
        </div>

        <div id="contact" class="page">
            <h1>Contact</h1>
            <p>Check out my full profile and socials here:</p>
            <a href="https://guns.lol/azmi" target="_blank" class="guns-link">guns.lol/azmi</a>
        </div>
    </div>

    <script>
        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }

        function copy(id) {
            const text = document.getElementById(id).innerText;
            navigator.clipboard.writeText(text);
            alert("Code Copied: " + text);
        }
    </script>
</body>
</html>
