<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honoured Inventory</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&display=swap" rel="stylesheet">

    <style>
        * { font-family: 'Finger Paint', cursive !important; box-sizing: border-box; }

        body { 
            background-color: #000; 
            color: #fff; 
            margin: 0; 
            display: flex; 
            height: 100vh; 
            overflow: hidden;
            background: radial-gradient(circle at 10% 50%, #200 0%, #000 100%);
        }

        /* Sidebar */
        .sidebar { 
            width: 260px; 
            background: rgba(5, 5, 5, 0.95); 
            padding: 40px 20px; 
            display: flex; 
            flex-direction: column; 
            border-right: 3px solid #FF0000;
            box-shadow: 10px 0 20px rgba(255, 0, 0, 0.1);
            z-index: 10;
        }

        .sidebar-title { 
            font-size: 1.8rem; 
            margin-bottom: 20px; 
            color: #FF0000; 
            text-shadow: 0 0 15px rgba(255, 0, 0, 0.6);
            text-transform: uppercase;
        }

        .nav-btn { 
            background: #000; 
            border: 1px solid #444; 
            color: #fff; 
            padding: 18px 15px; 
            text-align: left; 
            cursor: pointer; 
            margin-bottom: 15px;
            font-size: 1.1rem;
            transition: 0.3s;
        }

        .nav-btn.active { 
            border: 2px solid #5ab9ff !important; 
            box-shadow: 0 0 20px rgba(90, 185, 255, 0.6);
            transform: translateX(10px);
            background: #001;
        }

        .nav-btn:hover:not(.active) { border-color: #FF0000; background: #100; }

        .settings-btn {
            margin-top: auto;
            background: #111;
            border: 2px solid #fff;
            color: #fff;
            padding: 15px;
            cursor: pointer;
            text-align: center;
            font-size: 0.8rem;
        }

        /* JJS Style Settings Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.9);
            z-index: 100;
            justify-content: center;
            align-items: center;
        }

        .settings-card {
            background: rgba(10, 10, 10, 0.98);
            border: 4px solid #FF0000;
            width: 480px;
            padding: 40px;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.3);
        }

        .settings-header {
            font-size: 2.2rem;
            color: #FF0000;
            border-bottom: 2px solid #333;
            margin-bottom: 30px;
            padding-bottom: 10px;
            text-align: left;
        }

        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-size: 1.2rem;
        }

        /* --- THE NEW SLIDER SWITCH --- */
        .switch-container {
            position: relative;
            width: 65px;
            height: 30px;
            background: #333;
            border-radius: 30px; /* Pill shape */
            cursor: pointer;
            transition: background 0.3s;
            border: 1px solid #555;
        }

        .switch-handle {
            position: absolute;
            top: 3px;
            left: 3px;
            width: 22px;
            height: 22px;
            background: #fff;
            border-radius: 50%;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* State when music is ON */
        .switch-container.active {
            background: #5ab9ff;
            box-shadow: 0 0 15px rgba(90, 185, 255, 0.4);
            border-color: #fff;
        }

        .switch-container.active .switch-handle {
            transform: translateX(35px); /* Moves it to the right side */
        }

        /* --- VOLUME SLIDER --- */
        .volume-wrapper { width: 180px; }
        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: #222;
            height: 6px;
            border-radius: 5px;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 24px;
            background: #FF0000;
            border: 2px solid #fff;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(255,0,0,0.5);
        }

        .help-btn {
            width: 100%;
            background: #222;
            color: #fff;
            border: 2px solid #FF0000;
            padding: 15px;
            margin-top: 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        .help-btn:hover { background: #FF0000; }

        .close-settings {
            display: block;
            margin: 25px auto 0;
            background: none;
            border: none;
            color: #FF0000;
            cursor: pointer;
            text-transform: uppercase;
        }

        /* Main Content */
        .main-content { flex-grow: 1; padding: 60px; overflow-y: auto; }
        h1 { font-size: 4.5rem; margin: 0 0 20px 0; color: #FF0000; text-shadow: 4px 4px 0px #fff; letter-spacing: -3px; }
        .status-msg { font-size: 1.5rem; color: #555; border: 2px dashed #333; padding: 40px; text-align: center; margin-top: 20px; }
        .page { display: none; }
        .page.active { display: block; }
    </style>
</head>
<body>

    <audio id="bgMusic" loop>
        <source src="Let%20It%20Ride%20-%20Anno%20Domini%20Beats.mp3" type="audio/mpeg">
    </audio>

    <div class="sidebar">
        <div class="sidebar-title">Honoured<br>Inventory</div>
        <button class="nav-btn active" onclick="showPage('home', this)">Home</button>
        <button class="nav-btn" onclick="showPage('codes', this)">Codes</button>
        <button class="nav-btn" onclick="showPage('movesets', this)">Movesets</button>
        <button class="nav-btn" onclick="showPage('animations', this)">Animations</button>
        <button class="nav-btn" onclick="showPage('contact', this)">Contact</button>
        <button class="settings-btn" onclick="toggleSettings()">SETTINGS ⚙️</button>
    </div>

    <div class="modal-overlay" id="settingsModal">
        <div class="settings-card">
            <div class="settings-header">SETTINGS</div>
            
            <div class="setting-row">
                <span>Music Toggle</span>
                <div class="switch-container" id="musicToggle" onclick="toggleMusic()">
                    <div class="switch-handle"></div>
                </div>
            </div>

            <div class="setting-row">
                <span>Volume</span>
                <div class="volume-wrapper">
                    <input type="range" id="volSlider" min="0" max="1" step="0.05" value="0.4" oninput="updateVol()">
                </div>
            </div>

            <button class="help-btn" onclick="showHelp()">HOW TO USE SITE</button>
            <button class="close-settings" onclick="toggleSettings()">CLOSE</button>
        </div>
    </div>

    <div class="main-content">
        <div id="home" class="page active">
            <h1>Home</h1>
            <p style="font-size: 1.4rem;">Welcome to THE HONOURED INVENTORY. Suit yourself with any animation or moveset.</p>
            <div style="max-width: 850px; aspect-ratio: 16/9; border: 6px solid #FF0000; box-shadow: 0 0 50px rgba(255, 0, 0, 0.4);">
                <iframe src="https://www.youtube.com/embed/DUqZNqbLF5g" style="width:100%; height:100%; border:none;" allowfullscreen></iframe>
            </div>
        </div>
        <div id="codes" class="page"><h1>Codes</h1><div class="status-msg">No codes yet.</div></div>
        <div id="movesets" class="page"><h1>Movesets</h1><div class="status-msg">Inventory empty.</div></div>
        <div id="animations" class="page"><h1>Animations</h1><div class="status-msg">No animations yet.</div></div>
        <div id="contact" class="page"><h1>Contact</h1><a href="https://guns.lol/azmi" target="_blank" style="color:#FF0000; font-size: 2rem;">guns.lol/azmi</a></div>
    </div>

    <script>
        const music = document.getElementById('bgMusic');
        const mToggle = document.getElementById('musicToggle');
        const modal = document.getElementById('settingsModal');
        const volSlider = document.getElementById('volSlider');

        function toggleSettings() {
            modal.style.display = (modal.style.display === 'flex') ? 'none' : 'flex';
        }

        function toggleMusic() {
            if (music.paused) {
                music.play().then(() => {
                    mToggle.classList.add('active');
                }).catch(e => alert("Please interact with the page first!"));
            } else {
                music.pause();
                mToggle.classList.remove('active');
            }
        }

        function updateVol() {
            music.volume = volSlider.value;
        }

        function showHelp() {
            alert("Honoured Inventory Guide:\n\n1. Navigation: Sidebar links.\n2. Settings: Use the slider to toggle music.\n3. Volume: Adjust the slider bar.\n4. Credits: Always credit AzmiYT.");
        }

        function showPage(pageId, btn) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(pageId).classList.add('active');
            btn.classList.add('active');
        }
    </script>
</body>
</html>
