<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Honoured | Absolute Inventory</title>
    <link href="https://fonts.googleapis.com/css2?family=Finger+Paint&family=Orbitron:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { 
            --primary: #f00; 
            --accent: #00e5ff;
            --bg-dark: #0a0a0a;
            --glass: rgba(20, 20, 20, 0.8);
            --border-glow: rgba(255, 0, 0, 0.3);
        }

        * { 
            box-sizing: border-box; 
            scrollbar-width: none; 
            cursor: none;
        }
        *::-webkit-scrollbar { display: none; }

        body { 
            background: var(--bg-dark);
            color: #eee;
            margin: 0;
            font-family: 'Finger Paint', cursive;
            display: flex;
            height: 100vh;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(255,255,255,0.05) 1px, transparent 0);
            background-size: 40px 40px;
        }

        /* --- CURSOR SYSTEM --- */
        #cursor { position: fixed; width: 10px; height: 10px; background: #fff; border-radius: 50%; pointer-events: none; z-index: 9999999; transform: translate(-50%, -50%); mix-blend-mode: difference; transition: transform 0.1s; }
        #trail { position: fixed; width: 30px; height: 30px; border: 1px solid var(--accent); border-radius: 50%; pointer-events: none; z-index: 9999998; transform: translate(-50%, -50%); transition: 0.15s ease-out; box-shadow: 0 0 15px var(--accent); }

        /* --- SIDEBAR REDESIGN --- */
        .sidebar { 
            width: 300px; 
            background: var(--glass);
            backdrop-filter: blur(15px);
            border-right: 1px solid var(--primary);
            display: flex;
            flex-direction: column;
            padding: 40px 20px;
            z-index: 1000;
            transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            box-shadow: 10px 0 30px rgba(0,0,0,0.5);
        }

        .sidebar.hidden { transform: translateX(-100%); }

        #toggle-btn {
            position: fixed; top: 25px; left: 20px; z-index: 2000;
            background: var(--primary); border: none; color: white;
            width: 45px; height: 45px; border-radius: 8px; font-weight: bold;
            box-shadow: 0 0 15px var(--primary); transition: 0.3s;
        }

        .branding h2 { 
            font-family: 'Orbitron', sans-serif;
            font-size: 1.4rem; letter-spacing: 2px; margin-bottom: 40px; 
        }
        .branding span { color: var(--primary); text-shadow: 0 0 10px var(--primary); }

        /* --- NAVIGATION BUTTONS --- */
        .nav-btn {
            width: 100%; padding: 15px; margin-bottom: 10px;
            background: transparent; border: 1px solid rgba(255,255,255,0.1);
            color: #888; text-align: left; transition: 0.3s;
            border-radius: 4px; position: relative; overflow: hidden;
        }

        .nav-btn:hover, .nav-btn.active {
            color: #fff; border-color: var(--primary);
            background: linear-gradient(90deg, rgba(255,0,0,0.1) 0%, transparent 100%);
            padding-left: 25px;
        }

        /* --- CONTENT AREA --- */
        .main-content { 
            flex: 1; padding: 80px; overflow-y: auto; 
            display: flex; flex-direction: column; align-items: center;
        }

        .page { display: none; width: 100%; max-width: 900px; animation: fadeIn 0.5s ease; }
        .page.active { display: flex; flex-direction: column; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* --- GLASS CARDS --- */
        .card {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.05);
            padding: 25px; border-radius: 12px; margin-bottom: 20px;
            transition: 0.3s; border-left: 5px solid var(--primary);
        }
        .card:hover { transform: scale(1.02); background: rgba(255,255,255,0.05); border-color: var(--primary); }

        /* --- INPUTS & BUTTONS --- */
        .action-btn {
            background: var(--primary); color: white; border: none;
            padding: 12px 28px; border-radius: 4px; font-weight: bold;
            text-transform: uppercase; letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(255, 0, 0, 0.4); transition: 0.3s;
        }
        .action-btn:hover { filter: brightness(1.2); transform: translateY(-2px); }

        /* --- MODAL --- */
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 5000; justify-content: center; align-items: center; backdrop-filter: blur(10px); }
        .modal-content { 
            background: #111; border: 1px solid var(--accent); padding: 40px; 
            width: 450px; border-radius: 15px; box-shadow: 0 0 50px rgba(0,229,255,0.2);
        }

        .glitch-text { animation: glitch 0.4s infinite alternate; }
        @keyframes glitch { 0% { text-shadow: 2px 0 red, -2px 0 blue; } 100% { text-shadow: -2px 0 red, 2px 0 blue; } }
    </style>
</head>
<body onclick="playSfx()">

    <audio id="sfx_click" src="https://www.fesliyanstudios.com/play-mp3/387"></audio>
    <audio id="bgm" loop><source src="Let It Ride - Anno Domini Beats.mp3"></audio>

    <div id="cursor"></div>
    <div id="trail"></div>

    <button id="toggle-btn" onclick="toggleSidebar()">☰</button>

    <div class="sidebar" id="sidebar">
        <div class="branding">
            <h2 id="brand-logo" class="glitch-text">HONOURED<br><span>INVENTORY</span></h2>
        </div>
        
        <button class="nav-btn active" onclick="nav('h',this)">01. HOME</button>
        <button class="nav-btn" onclick="nav('c',this)">02. CODES</button>
        <button class="nav-btn" onclick="nav('m',this)">03. MOVESETS</button>
        <button class="nav-btn" onclick="nav('a',this)">04. ANIMATIONS</button>
        <button class="nav-btn" onclick="nav('co',this)">05. CONTACT</button>
        
        <button class="nav-btn" style="margin-top:auto; border-color:var(--accent); color:var(--accent);" onclick="toggleModal()">⚙️ SYSTEM OVERRIDE</button>
    </div>

    <div class="main-content">
        <!-- Home -->
        <div id="h" class="page active">
            <h1 style="font-family: 'Orbitron';">DASHBOARD</h1>
            <div class="card">
                <p style="color: var(--accent);">STATUS: CONNECTED // ENCRYPTION: AES-256</p>
                <p>Welcome to the custom toolset. Use of strings is at your own discretion. Stay Honoured.</p>
            </div>
            <div style="width:100%; aspect-ratio:16/9; border:1px solid var(--primary); border-radius:12px; overflow:hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/7E-KYBDySz8" frameborder="0" allowfullscreen></iframe>
            </div>
        </div>

        <!-- Codes -->
        <div id="c" class="page">
            <h1 style="font-family: 'Orbitron';">ARCHIVE</h1>
            <div id="c-list">
                <div class="card">
                    <h3>Health Indicator UI</h3>
                    <p>Standard HP/Stamina overlay for combat data.</p>
                    <button class="action-btn" onclick="openCode('HEALTH_UI_V4_AURA')">Access Data</button>
                </div>
            </div>
            <div id="c-sub" style="display:none; width:100%">
                <button class="action-btn" style="background:#222; margin-bottom:20px;" onclick="closeCode()">« Return</button>
                <textarea id="code-box" readonly style="width:100%; height:250px; background:#000; border:1px solid var(--primary); color:var(--accent); padding:20px; font-family: monospace; border-radius:8px;"></textarea>
                <button class="action-btn" style="width:100%; background:var(--accent); color:#000; margin-top:20px;" onclick="copyCode()">Copy Data Sequence</button>
            </div>
        </div>
    </div>

    <!-- System Modal -->
    <div class="modal" id="sys-modal">
        <div class="modal-content">
            <h2 style="color:var(--accent); font-family: 'Orbitron';">SYSTEM SETTINGS</h2>
            <hr style="border-color: rgba(255,255,255,0.1);">
            <div style="margin: 20px 0;">
                <p>Volume Control</p>
                <input type="range" style="width:100%; accent-color: var(--primary);" oninput="setV(this.value)">
            </div>
            <button class="action-btn" style="width:100%;" onclick="toggleModal()">Close Override</button>
        </div>
    </div>

    <script>
        // Enhanced Sidebar Toggle
        function toggleSidebar() {
            const sb = document.getElementById('sidebar');
            sb.classList.toggle('hidden');
            document.getElementById('toggle-btn').style.left = sb.classList.contains('hidden') ? '20px' : '260px';
        }

        // Navigation
        function nav(id, el) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            document.querySelectorAll('.nav-btn').forEach(n => n.classList.remove('active'));
            el.classList.add('active');
        }

        // Modal Logic
        function toggleModal() {
            const m = document.getElementById('sys-modal');
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // Cursor Logic
        window.addEventListener('mousemove', e => {
            const c = document.getElementById('cursor'), t = document.getElementById('trail');
            c.style.left = e.clientX+'px'; c.style.top = e.clientY+'px';
            t.style.left = e.clientX+'px'; t.style.top = e.clientY+'px';
        });

        // Code Access
        function openCode(str) { 
            document.getElementById('c-list').style.display='none'; 
            document.getElementById('c-sub').style.display='block'; 
            document.getElementById('code-box').value=str; 
        }
        function closeCode() { 
            document.getElementById('c-list').style.display='block'; 
            document.getElementById('c-sub').style.display='none'; 
        }
        function copyCode() { 
            document.getElementById('code-box').select(); 
            document.execCommand('copy'); 
            alert("Sequence Copied to Clipboard."); 
        }

        function playSfx() { document.getElementById('sfx_click').play(); }
    </script>
</body>
</html>
