<style>
    /* ... existing styles ... */

    /* SIDEBAR LOCKDOWN - UPDATED FOR SCROLLING */
    .sd { 
        width: 320px; 
        background: var(--side-bg); 
        backdrop-filter: blur(25px); 
        padding: 45px 30px; 
        display: flex; 
        flex-direction: column; 
        border-right: 3px solid var(--p); 
        z-index: 100; 
        transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
        box-shadow: 20px 0 60px rgba(0,0,0,1);
        
        /* THE FIX: Enable scrolling but hide the bar */
        overflow-y: auto;
        scrollbar-width: none; /* Firefox */
    }
    .sd::-webkit-scrollbar {
        display: none; /* Chrome/Safari/Edge */
    }

    /* Adding a fade effect at the bottom so you know it scrolls */
    .sd::after {
        content: "";
        position: sticky;
        bottom: -45px;
        left: 0;
        width: 100%;
        height: 40px;
        background: linear-gradient(transparent, var(--g));
        pointer-events: none;
    }

    /* ... rest of the code ... */
</style>
