<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My YouTube Channel & Portfolio</title>
    <style>
        body { font-family: 'Inter', sans-serif; background: #121212; color: white; text-align: center; margin: 0; padding: 0; }
        header { padding: 80px 20px; background: linear-gradient(180deg, #1f1f1f 0%, #121212 100%); }
        h1 { font-size: 3rem; margin-bottom: 10px; color: #FF0000; } /* YouTube Red */
        .container { max-width: 800px; margin: auto; padding: 20px; }
        .video-container { position: relative; padding-bottom: 56.25%; height: 0; overflow: hidden; border-radius: 12px; background: #000; margin: 40px 0; }
        .video-container iframe { position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: 0; }
        .links { display: flex; justify-content: center; gap: 20px; margin-top: 30px; }
        .btn { padding: 12px 25px; border-radius: 30px; text-decoration: none; font-weight: bold; transition: 0.3s; }
        .btn-yt { background: #FF0000; color: white; }
        .btn-personal { border: 1px solid white; color: white; }
        .btn:hover { opacity: 0.8; transform: scale(1.05); }
    </style>
</head>
<body>

    <header>
        <h1>Welcome to My Channel</h1>
        <p>Sharing my journey, one video at a time.</p>
        <div class="links">
            <a href="YOUR_YOUTUBE_URL_HERE" class="btn btn-yt">Subscribe</a>
            <a href="#about" class="btn btn-personal">About Me</a>
        </div>
    </header>

    <div class="container">
        <h2>Latest Video</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
        </div>
        
        <section id="about">
            <h2>Personal Use</h2>
            <p>This is where I document my projects outside of YouTube. Stay tuned for updates!</p>
        </section>
    </div>

</body>
</html>
